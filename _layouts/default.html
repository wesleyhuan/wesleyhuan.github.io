<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <!-- 讓網頁在手機上正常縮放，少了這行手機看會超小 -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- {{ site.title }} 從 _config.yml 抓 title 欄位 -->
  <title>{{ site.title }}</title>

  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

  <!-- 頁首(Hero)：網站標題、一句話介紹，加上行動按鈕 -->
  <header class="site-header">
    <h1>{{ site.title }}</h1>
    <p class="tagline">{{ site.tagline }}</p>

    <!-- Hero CTA：主要按鈕導向 Email，次要按鈕到 GitHub / LinkedIn -->
    <div class="hero-cta">
      <a class="btn btn-primary" href="mailto:{{ site.email }}">Get in touch</a>
      <a class="btn" href="{{ site.github_url }}">GitHub</a>
      <a class="btn" href="{{ site.linkedin_url }}">LinkedIn</a>
    </div>
  </header>

  <!-- 主要內容區：
       {{ content }} 是佔位符，
       任何套用這個 layout 的頁面，內容會被塞進這裡 -->
  <main>
    {{ content }}
  </main>

  <!-- 頁尾：聯絡連結，同樣從 _config.yml 抓資料 -->
  <footer class="site-footer">
    <a href="mailto:{{ site.email }}">Email</a>
    <a href="{{ site.github_url }}">GitHub</a>
    <a href="{{ site.linkedin_url }}">LinkedIn</a>
  </footer>

</body>
</html>
